name: Build DroidFS

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK components
      run: |
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Install NDK 25.2.9519653
      run: sdkmanager 'ndk;25.2.9519653'

    - name: Set NDK path
      run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config npm

    - name: Initialize submodules
      run: git submodule update --init --recursive

    - name: Cache FFmpeg build
      uses: actions/cache@v4
      id: cache-ffmpeg
      with:
        path: app/ffmpeg/build
        key: ffmpeg-${{ runner.os }}-${{ hashFiles('app/ffmpeg/build.sh') }}

    - name: Cache CryFS native build
      uses: actions/cache@v4
      id: cache-cryfs
      with:
        path: |
          app/libcryfs/vendor/boost/Boost-for-Android/build
          app/build/.cxx
        key: cryfs-${{ runner.os }}-${{ hashFiles('app/CMakeLists.txt') }}
        restore-keys: |
          cryfs-${{ runner.os }}-

    - name: Build FFmpeg
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      run: |
        cd app/ffmpeg
        ./build.sh

    - name: Build libgocryptfs
      run: |
        cd app/libgocryptfs
        ./build.sh

    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Generate keystore
      run: |
        keytool -genkey -keystore keystore.jks -alias key -keyalg EC -validity 10000 \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -dname "CN=DroidFS, OU=DroidFS, O=DroidFS, L=Unknown, ST=Unknown, C=US"

    - name: Sign APK
      run: |
        "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
          --out DroidFS-signed.apk \
          -v \
          --ks keystore.jks \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.KEY_PASSWORD }} \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: DroidFS-signed
        path: DroidFS-signed.apk
        retention-days: 30
